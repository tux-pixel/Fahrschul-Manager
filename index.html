<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fit for Drive | Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .sidebar-link { transition: all 0.2s; border-left: 4px solid transparent; cursor: pointer; }
        .sidebar-link.active { background: rgba(255,255,255,0.1); border-left-color: #3b82f6; color: white; }
        .content-section { display: none; animation: fadeIn 0.3s ease; }
        .content-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .warning-blink { animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div id="login-screen" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[9999]">
        <div class="bg-white p-10 rounded-3xl shadow-2xl w-96 text-center">
            <div class="mb-6">
                <i class="fas fa-steering-wheel text-5xl text-blue-800"></i>
                <h1 class="text-2xl font-black mt-4 text-slate-800 uppercase tracking-tighter">Fit for Drive</h1>
                <p class="text-slate-400 text-xs uppercase tracking-widest">Management System</p>
            </div>
            <input type="text" id="login-user" placeholder="Benutzername" class="w-full p-3 border rounded-xl mb-3 focus:ring-2 focus:ring-blue-500 outline-none">
            <input type="password" id="login-pass" placeholder="Passwort" class="w-full p-3 border rounded-xl mb-6 focus:ring-2 focus:ring-blue-500 outline-none">
            <button onclick="handleLogin()" class="w-full bg-blue-800 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-200">Anmelden</button>
            <p id="login-msg" class="text-[10px] mt-4 text-slate-400 uppercase italic"></p>
        </div>
    </div>

    <aside class="w-72 bg-slate-900 text-slate-300 flex flex-col shadow-2xl">
        <div class="p-8 border-b border-slate-800">
            <div class="text-white font-black text-xl italic tracking-tighter">FIT FOR <span class="text-blue-500">DRIVE</span></div>
        </div>
        
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <div class="text-[10px] uppercase font-bold text-slate-500 px-4 mb-2 tracking-widest">Fahrten & Planung</div>
            <a onclick="showSection('bus')" class="sidebar-link active flex items-center p-3 rounded-lg" id="nav-bus"><i class="fas fa-bus w-8 text-blue-500"></i> Bus-Planer</a>
            <a onclick="showSection('auto')" class="sidebar-link flex items-center p-3 rounded-lg" id="nav-auto"><i class="fas fa-car-side w-8 text-orange-500"></i> Automatik-Planer</a>
            
            <div class="text-[10px] uppercase font-bold text-slate-500 px-4 mt-8 mb-2 tracking-widest">Verwaltung</div>
            <a onclick="showSection('fleet')" class="sidebar-link flex items-center p-3 rounded-lg" id="nav-fleet"><i class="fas fa-file-contract w-8 text-emerald-500"></i> Leasing-Fuhrpark</a>
            <a onclick="showSection('todo')" class="sidebar-link flex items-center p-3 rounded-lg" id="nav-todo"><i class="fas fa-list-check w-8 text-red-500"></i> To-Do Liste</a>
            <a onclick="showSection('workshop')" class="sidebar-link flex items-center p-3 rounded-lg" id="nav-workshop"><i class="fas fa-paint-roller w-8 text-slate-400"></i> Werkstatt & Design</a>

            <div id="admin-nav" class="hidden border-t border-slate-800 pt-6 mt-6">
                <div class="text-[10px] uppercase font-bold text-slate-500 px-4 mb-2 tracking-widest">System</div>
                <a onclick="showSection('archive')" class="sidebar-link flex items-center p-3 rounded-lg" id="nav-archive"><i class="fas fa-box-archive w-8 text-purple-400"></i> Archiv</a>
                <a onclick="showSection('users')" class="sidebar-link flex items-center p-3 rounded-lg" id="nav-users"><i class="fas fa-users-gear w-8 text-slate-300"></i> Benutzerverwaltung</a>
            </div>
        </nav>

        <div class="p-6 border-t border-slate-800 bg-slate-900/50">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center text-white font-bold" id="user-initials">?</div>
                <div>
                    <p class="text-sm font-bold text-white leading-none" id="user-name-display"></p>
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-tighter" id="user-role-display"></p>
                </div>
            </div>
            <button onclick="location.reload()" class="w-full py-2 text-xs bg-red-900/20 text-red-400 hover:bg-red-900 hover:text-white rounded-lg transition">Abmelden</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white h-20 border-b flex items-center justify-between px-10">
            <h2 class="text-xl font-bold text-slate-800" id="current-section-title">Bus-Planer</h2>
            <div class="flex items-center gap-6">
                <div class="text-right border-r pr-6 border-slate-100">
                    <div id="header-date" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest"></div>
                    <div id="header-time" class="text-2xl font-mono font-black text-blue-900"></div>
                </div>
                <div id="fleet-alert-indicator"></div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-10 space-y-8" id="content-area">
            
            <div id="section-bus" class="content-section active">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 mb-6">
                    <div class="grid grid-cols-1 md:grid-cols-6 gap-4 items-end">
                        <div class="md:col-span-1"><label class="text-[10px] font-bold text-slate-400 uppercase">Datum</label><input type="date" id="bus-date" class="w-full p-2 border rounded-lg"></div>
                        <div><label class="text-[10px] font-bold text-slate-400 uppercase">Start</label><input type="time" id="bus-start" class="w-full p-2 border rounded-lg"></div>
                        <div><label class="text-[10px] font-bold text-slate-400 uppercase">Ende</label><input type="time" id="bus-end" class="w-full p-2 border rounded-lg"></div>
                        <div class="md:col-span-1"><label class="text-[10px] font-bold text-slate-400 uppercase">Zweck</label><input type="text" id="bus-reason" class="w-full p-2 border rounded-lg" placeholder="..."></div>
                        <div><label class="text-[10px] font-bold text-slate-400 uppercase">Fahrer</label><select id="bus-user-select" class="w-full p-2 border rounded-lg font-bold text-blue-600"></select></div>
                        <button onclick="saveGenericBooking('bus')" class="bg-blue-600 text-white p-2 rounded-lg font-bold hover:shadow-lg transition">Speichern</button>
                    </div>
                </div>
                <div id="bus-list" class="space-y-3"></div>
            </div>

            <div id="section-auto" class="content-section">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 mb-6">
                    <div class="grid grid-cols-1 md:grid-cols-6 gap-4 items-end">
                        <div class="md:col-span-1"><input type="date" id="auto-date" class="w-full p-2 border rounded-lg"></div>
                        <div><input type="time" id="auto-start" class="w-full p-2 border rounded-lg"></div>
                        <div><input type="time" id="auto-end" class="w-full p-2 border rounded-lg"></div>
                        <div class="md:col-span-1"><input type="text" id="auto-reason" class="w-full p-2 border rounded-lg" placeholder="Zweck"></div>
                        <div><select id="auto-user-select" class="w-full p-2 border rounded-lg font-bold text-orange-600"></select></div>
                        <button onclick="saveGenericBooking('auto')" class="bg-orange-500 text-white p-2 rounded-lg font-bold transition">Speichern</button>
                    </div>
                </div>
                <div id="auto-list" class="space-y-3"></div>
            </div>

            <div id="section-fleet" class="content-section">
                <div id="fleet-admin-tools" class="hidden bg-white p-8 rounded-2xl shadow-sm border mb-8 border-l-8 border-l-emerald-500">
                    <h3 class="font-bold text-slate-800 mb-4">Neues Leasing-Fahrzeug</h3>
                    <div class="grid grid-cols-4 gap-6 items-end">
                        <div><label class="text-[10px] font-bold text-slate-400 uppercase">Modell</label><input type="text" id="f-model" class="w-full p-2 border rounded-lg"></div>
                        <div><label class="text-[10px] font-bold text-slate-400 uppercase">Kauf</label><input type="date" id="f-bought" class="w-full p-2 border rounded-lg"></div>
                        <div><label class="text-[10px] font-bold text-slate-400 uppercase">Rückgabe</label><input type="date" id="f-end" class="w-full p-2 border rounded-lg"></div>
                        <button onclick="addFleetItem()" class="bg-emerald-600 text-white p-2 rounded-lg font-bold">Hinzufügen</button>
                    </div>
                </div>
                <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b text-[10px] uppercase font-bold text-slate-500 tracking-widest">
                            <tr><th class="p-6">Modell</th><th>Kauf</th><th>Rückgabe</th><th>Status</th><th class="p-6 text-right">Aktion</th></tr>
                        </thead>
                        <tbody id="fleet-list"></tbody>
                    </table>
                </div>
            </div>

            <div id="section-todo" class="content-section">
                <div id="todo-admin-tools" class="hidden bg-white p-6 rounded-2xl shadow-sm border mb-6 border-l-8 border-l-red-500">
                    <div class="grid grid-cols-4 gap-4 items-end">
                        <div><input type="date" id="todo-date" class="w-full p-2 border rounded-lg"></div>
                        <div class="col-span-2"><input type="text" id="todo-task" class="w-full p-2 border rounded-lg" placeholder="Aufgabe..."></div>
                        <button onclick="addTask('todo')" class="bg-red-500 text-white p-2 rounded-lg font-bold">Anlegen</button>
                    </div>
                </div>
                <div id="todo-list" class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                    <table class="w-full text-left">
                        <tbody id="todo-table-body"></tbody>
                    </table>
                </div>
            </div>

            <div id="section-workshop" class="content-section">
                <div id="workshop-admin-tools" class="hidden bg-white p-6 rounded-2xl shadow-sm border mb-6 border-l-8 border-l-slate-800">
                    <div class="grid grid-cols-4 gap-4 items-end">
                        <div><input type="date" id="workshop-date" class="w-full p-2 border rounded-lg"></div>
                        <div class="col-span-2"><input type="text" id="workshop-task" class="w-full p-2 border rounded-lg" placeholder="Werkstatt Details..."></div>
                        <button onclick="addTask('workshop')" class="bg-slate-800 text-white p-2 rounded-lg font-bold">Planen</button>
                    </div>
                </div>
                <div id="workshop-list-container" class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                    <table class="w-full text-left">
                        <tbody id="workshop-table-body"></tbody>
                    </table>
                </div>
            </div>

            <div id="section-archive" class="content-section">
                <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                    <table class="w-full text-left">
                        <tbody id="archive-table-body"></tbody>
                    </table>
                </div>
            </div>

            <div id="section-users" class="content-section">
                <div class="bg-white p-8 rounded-2xl shadow-sm border mb-8 border-l-8 border-l-blue-900">
                    <div class="grid grid-cols-4 gap-4 items-end">
                        <div><input type="text" id="u-name" class="p-2 border w-full rounded-lg" placeholder="Name"></div>
                        <div><input type="password" id="u-pass" class="p-2 border w-full rounded-lg" placeholder="Passwort"></div>
                        <div><select id="u-role" class="p-2 border w-full rounded-lg"><option value="Mitarbeiter">Mitarbeiter</option><option value="Büro">Büro</option><option value="admin">Admin</option></select></div>
                        <button onclick="createUser()" class="bg-blue-900 text-white p-2 rounded-lg font-bold">Nutzer anlegen</button>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="user-grid"></div>
            </div>

        </div>
    </main>

    <script>
        // --- KONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyA66gfqlheXMBYLc-U95zKR6JN4P5IHWKk",
            authDomain: "fahrschul-manager-258d9.firebaseapp.com",
            databaseURL: "https://fahrschul-manager-258d9-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "fahrschul-manager-258d9",
            storageBucket: "fahrschul-manager-258d9.firebasestorage.app",
            messagingSenderId: "236536433656",
            appId: "1:236536433656:web:de285f8abdb14373a9e40d",
            measurementId: "G-GBQZXCEVZS"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = null;
        let mainData = {};

        // --- AUTH & LOGIN ---
        function handleLogin() {
            const u = document.getElementById('login-user').value.trim();
            const p = document.getElementById('login-pass').value.trim();
            const msg = document.getElementById('login-msg');

            if(!u || !p) return alert("Bitte Felder füllen!");

            db.ref('users').once('value', s => {
                const userData = s.val();
                
                // INITIAL-MODUS: Falls kein User existiert, admin/admin erlauben
                if (!userData) {
                    if (u === "admin" && p === "admin") {
                        const firstAdmin = { id: Date.now(), name: "admin", pass: "admin", role: "admin" };
                        db.ref('users/' + firstAdmin.id).set(firstAdmin);
                        currentUser = firstAdmin;
                        startApp();
                    } else {
                        msg.innerText = "Datenbank leer. Nutze 'admin' / 'admin'.";
                    }
                    return;
                }

                const users = Object.values(userData);
                const found = users.find(x => x.name === u && x.pass === p);

                if(found) {
                    currentUser = found;
                    startApp();
                } else {
                    alert("Zugriff verweigert!");
                }
            });
        }

        function startApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('user-name-display').innerText = currentUser.name;
            document.getElementById('user-role-display').innerText = currentUser.role;
            document.getElementById('user-initials').innerText = currentUser.name.charAt(0);

            const isPrivileged = (currentUser.role === 'admin' || currentUser.role === 'Büro');
            if(isPrivileged) {
                document.getElementById('admin-nav').classList.remove('hidden');
                document.getElementById('fleet-admin-tools').classList.remove('hidden');
                document.getElementById('todo-admin-tools').classList.remove('hidden');
                document.getElementById('workshop-admin-tools').classList.remove('hidden');
            }
            syncData();
            updateClock();
            setInterval(updateClock, 1000);
        }

        function syncData() {
            db.ref('/').on('value', s => {
                mainData = s.val() || {};
                renderPlaner('bus');
                renderPlaner('auto');
                renderGenericList('todo');
                renderGenericList('workshop');
                renderFleet();
                renderArchive();
                renderUsers();
                refreshUserSelects();
            });
        }

        // --- LOGIK ---
        function saveGenericBooking(type) {
            const entry = {
                id: Date.now(),
                date: document.getElementById(`${type}-date`).value,
                start: document.getElementById(`${type}-start`).value,
                end: document.getElementById(`${type}-end`).value,
                reason: document.getElementById(`${type}-reason`).value,
                person: document.getElementById(`${type}-user-select`).value,
                type: type
            };
            if(!entry.date || !entry.start) return alert("Daten unvollständig!");
            db.ref(type + '/' + entry.id).set(entry);
        }

        function renderPlaner(type) {
            const list = document.getElementById(type + '-list');
            const items = Object.values(mainData[type] || {}).sort((a,b) => a.date.localeCompare(b.date));
            const isPrivileged = (currentUser.role === 'admin' || currentUser.role === 'Büro');

            list.innerHTML = items.map(i => `
                <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 ${type==='bus'?'border-l-blue-600':'border-l-orange-500'} flex justify-between items-center">
                    <div class="flex items-center gap-6">
                        <div class="text-center min-w-[60px]"><p class="text-[10px] font-bold text-slate-400">${new Date(i.date).toLocaleDateString('de-DE', {weekday:'short'})}</p><p class="font-black text-slate-800">${new Date(i.date).toLocaleDateString('de-DE', {day:'2-digit', month:'2-digit'})}</p></div>
                        <div class="bg-slate-50 px-3 py-1 rounded-lg border font-mono text-sm font-bold text-slate-600">${i.start} - ${i.end}</div>
                        <div><p class="text-blue-600 font-black uppercase text-xs">${i.person}</p><p class="text-xs text-slate-400 italic">${i.reason || '-'}</p></div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="archiveItem('${type}', '${i.id}')" class="w-8 h-8 rounded-full bg-purple-50 text-purple-600 hover:bg-purple-600 hover:text-white transition"><i class="fas fa-check"></i></button>
                        ${isPrivileged ? `<button onclick="hardDelete('${type}', '${i.id}')" class="w-8 h-8 rounded-full bg-red-50 text-red-600 hover:bg-red-600 hover:text-white transition"><i class="fas fa-trash"></i></button>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function addTask(type) {
            const d = document.getElementById(type + '-date').value;
            const t = document.getElementById(type + '-task').value;
            if(!d || !t) return;
            db.ref(type + '/' + Date.now()).set({ id: Date.now(), date: d, task: t, type: type });
            document.getElementById(type + '-task').value = "";
        }

        function renderGenericList(type) {
            const body = document.getElementById(type + '-table-body');
            const items = Object.values(mainData[type] || {}).sort((a,b) => a.date.localeCompare(b.date));
            const isPrivileged = (currentUser.role === 'admin' || currentUser.role === 'Büro');

            body.innerHTML = items.map(i => `
                <tr class="border-b hover:bg-slate-50">
                    <td class="p-4 font-bold text-slate-600 w-32">${new Date(i.date).toLocaleDateString('de-DE')}</td>
                    <td class="p-4">${i.task}</td>
                    <td class="p-4 text-right">
                        <button onclick="archiveItem('${type}', '${i.id}')" class="text-purple-500 mr-4"><i class="fas fa-check-circle"></i></button>
                        ${isPrivileged ? `<button onclick="hardDelete('${type}', '${i.id}')" class="text-red-300 hover:text-red-600"><i class="fas fa-trash"></i></button>` : ''}
                    </td>
                </tr>
            `).join('');
        }

        function renderFleet() {
            const list = document.getElementById('fleet-list');
            const items = Object.values(mainData.fleet || {});
            const isPrivileged = (currentUser.role === 'admin' || currentUser.role === 'Büro');
            const indicator = document.getElementById('fleet-alert-indicator');
            indicator.innerHTML = "";

            list.innerHTML = items.map(i => {
                const diff = (new Date(i.end) - new Date()) / (1000*60*60*24*30.44);
                if(diff <= 3 && isPrivileged) indicator.innerHTML = `<div class="bg-red-600 text-white px-4 py-2 rounded-xl text-xs font-black warning-blink">LEASING ALARM</div>`;
                
                return `<tr class="border-b">
                    <td class="p-6 font-black">${i.model}</td>
                    <td>${i.bought || '-'}</td>
                    <td>${i.end}</td>
                    <td><span class="px-2 py-1 bg-slate-100 rounded text-xs">${Math.ceil(diff)} Mon. Rest</span></td>
                    <td class="p-6 text-right">${isPrivileged ? `<button onclick="hardDelete('fleet', '${i.id}')" class="text-red-300"><i class="fas fa-trash"></i></button>` : ''}</td>
                </tr>`;
            }).join('');
        }

        function addFleetItem() {
            const m = document.getElementById('f-model').value;
            const b = document.getElementById('f-bought').value;
            const e = document.getElementById('f-end').value;
            if(m && e) db.ref('fleet/' + Date.now()).set({ id: Date.now(), model: m, bought: b, end: e });
        }

        function archiveItem(type, id) {
            const item = mainData[type][id];
            db.ref('archive/' + id).set({...item, originalType: type});
            db.ref(type + '/' + id).remove();
        }

        function renderArchive() {
            const body = document.getElementById('archive-table-body');
            const items = Object.values(mainData.archive || {});
            body.innerHTML = items.map(i => `
                <tr class="border-b text-sm">
                    <td class="p-4 uppercase font-bold text-purple-600 text-[10px]">${i.originalType}</td>
                    <td class="p-4">${i.date}</td>
                    <td class="p-4">${i.reason || i.task || 'Eintrag'}</td>
                    <td class="p-4 text-right">
                        <button onclick="hardDelete('archive', '${i.id}')" class="text-red-300"><i class="fas fa-trash-alt"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function createUser() {
            const n = document.getElementById('u-name').value;
            const p = document.getElementById('u-pass').value;
            const r = document.getElementById('u-role').value;
            if(n && p) db.ref('users/' + Date.now()).set({ id: Date.now(), name: n, pass: p, role: r });
        }

        function renderUsers() {
            const grid = document.getElementById('user-grid');
            const users = Object.values(mainData.users || {});
            grid.innerHTML = users.map(u => `
                <div class="bg-white p-5 rounded-2xl border flex justify-between items-center">
                    <div><p class="font-black text-slate-800">${u.name}</p><p class="text-[10px] text-blue-600 font-bold">${u.role}</p></div>
                    <button onclick="hardDelete('users', '${u.id}')" class="text-red-200 hover:text-red-600"><i class="fas fa-user-minus"></i></button>
                </div>
            `).join('');
        }

        function hardDelete(type, id) { if(confirm("Endgültig löschen?")) db.ref(type + '/' + id).remove(); }
        
        function showSection(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
            document.getElementById('section-'+id).classList.add('active');
            document.getElementById('nav-'+id).classList.add('active');
            document.getElementById('current-section-title').innerText = document.getElementById('nav-'+id).innerText;
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('header-time').innerText = now.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
            document.getElementById('header-date').innerText = now.toLocaleDateString('de-DE', {weekday:'long', day:'2-digit', month:'long'});
        }

        function refreshUserSelects() {
            const users = Object.values(mainData.users || {});
            const opts = users.map(u => `<option value="${u.name}">${u.name}</option>`).join('');
            document.getElementById('bus-user-select').innerHTML = opts;
            document.getElementById('auto-user-select').innerHTML = opts;
        }
    </script>
</body>
</html>
