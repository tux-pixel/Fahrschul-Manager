<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FleetPro - Rollenbasierte Anmeldung</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #4e73df; --secondary: #1cc88a; --info: #36b9cc;
            --warning: #f6c23e; --danger: #e74a3b; --dark: #5a5c69; --light: #f8f9fc;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Login Overlay */
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; display: flex; justify-content: center; align-items: center; }
        .auth-card { background: white; padding: 30px; border-radius: 10px; width: 350px; text-align: center; }
        
        .sidebar { width: 260px; background: linear-gradient(180deg, #2c3e50 0%, #000 100%); color: white; display: flex; flex-direction: column; padding: 20px; transition: 0.3s; }
        .sidebar h2 { text-align: center; border-bottom: 1px solid #444; padding-bottom: 15px; color: var(--info); }
        .nav-link { color: #bdc3c7; text-decoration: none; padding: 12px; margin: 5px 0; border-radius: 5px; cursor: pointer; display: flex; align-items: center; }
        .nav-link:hover, .nav-link.active { background: var(--primary); color: white; }
        
        .main { flex-grow: 1; overflow-y: auto; padding: 30px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .card { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        input, select, button { padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; width: 100%; box-sizing: border-box; }
        .btn { cursor: pointer; border: none; font-weight: bold; color: white; transition: 0.2s; width: auto; min-width: 100px; }
        .btn:hover { opacity: 0.8; }
        .btn-primary { background: var(--primary); }
        .btn-success { background: var(--secondary); }
        .btn-danger { background: var(--danger); }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        .hidden { display: none !important; }
        .admin-only { border: 2px solid var(--primary); }
    </style>
</head>
<body>

<!-- AUTHENTIFIZIERUNG -->
<div id="auth-overlay">
    <div class="auth-card" id="login-form">
        <h2 id="auth-title">Anmelden</h2>
        <input type="text" id="auth-user" placeholder="Benutzername">
        <input type="password" id="auth-pass" placeholder="Passwort">
        <button class="btn btn-primary" style="width: 100%" onclick="handleAuth()">Bestätigen</button>
        <p id="auth-msg" style="color: var(--danger); font-size: 0.8em; margin-top: 10px;"></p>
    </div>
</div>

<div class="sidebar">
    <h2>FleetPro</h2>
    <div class="nav-link active" onclick="showSection('dashboard')">🏠 Dashboard</div>
    <div class="nav-link" onclick="showSection('leasing')">📉 Fuhrpark</div>
    <div class="nav-link" onclick="showSection('todo')">✅ Aufgaben</div>
    <div class="nav-link" onclick="showSection('werkstatt')">🔧 Werkstatt</div>
    <div class="nav-link admin-btn hidden" id="nav-admin" onclick="showSection('admin')">🛡️ Admin-Bereich</div>
    
    <div style="margin-top: auto; padding: 10px; border-top: 1px solid #444;">
        <div id="user-info" style="font-size: 0.8em; margin-bottom: 10px; color: var(--secondary);"></div>
        <button class="btn btn-danger" style="width: 100%; font-size: 0.7em;" onclick="logout()">Abmelden</button>
    </div>
</div>

<div class="main">
    <div class="header">
        <h1 id="section-title">Dashboard</h1>
        <div id="current-date"></div>
    </div>

    <!-- SECTIONS (Dashboard, Leasing, Todo, Werkstatt bleiben wie gehabt) -->
    <!-- ... (Hier folgen deine bestehenden Sektionen) ... -->
    <div id="section-dashboard" class="content-section">
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;" id="stats-grid"></div>
        <div class="card" style="margin-top: 20px;">
            <h3>Dringende Rückgaben</h3>
            <table id="alert-table"><thead><tr><th>Fahrzeug</th><th>Ende</th><th>Status</th></tr></thead><tbody></tbody></table>
        </div>
    </div>

    <!-- LEASING -->
    <div id="section-leasing" class="content-section hidden">
        <div class="card">
            <h3>Fahrzeug hinzufügen</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px;">
                <input type="text" id="l-model" placeholder="Modell">
                <input type="date" id="l-start">
                <input type="number" id="l-months" placeholder="Monate">
                <button class="btn btn-success" onclick="addLease()">Speichern</button>
            </div>
        </div>
        <div class="card"><table id="l-table"><thead><tr><th>Modell</th><th>Start</th><th>Ende</th><th>Rest</th><th>Aktion</th></tr></thead><tbody></tbody></table></div>
    </div>

    <!-- TODO & WERKSTATT (Hier Platzhalter für deine Logik) -->
    <div id="section-todo" class="content-section hidden">
        <div class="card"><h3>Aufgaben</h3><button class="btn btn-primary" onclick="addTodo()">Neu (Test)</button></div>
    </div>
    <div id="section-werkstatt" class="content-section hidden">
        <div class="card"><h3>Werkstatt</h3></div>
    </div>

    <!-- ADMIN BEREICH (NEU) -->
    <div id="section-admin" class="content-section hidden">
        <div class="card admin-only">
            <h3>Eigene Daten ändern</h3>
            <input type="text" id="admin-new-name" placeholder="Neuer Name">
            <input type="password" id="admin-new-pass" placeholder="Neues Passwort">
            <button class="btn btn-primary" onclick="updateOwnProfile()">Profil aktualisieren</button>
        </div>

        <div class="card admin-only">
            <h3>Mitarbeiter verwalten</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px;">
                <input type="text" id="staff-name" placeholder="Name">
                <input type="password" id="staff-pass" placeholder="Passwort">
                <button class="btn btn-success" onclick="createStaff()">Anlegen</button>
            </div>
            <hr>
            <table id="staff-table">
                <thead><tr><th>Name</th><th>Rolle</th><th>Aktion</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // 1. FIREBASE KONFIGURATION
    const firebaseConfig = {
        apiKey: "AIzaSyA66gfqlheXMBYLc-U95zKR6JN4P5IHWKk",
        databaseURL: "https://fahrschul-manager-258d9-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "fahrschul-manager-258d9",
        storageBucket: "fahrschul-manager-258d9.appspot.com",
    };

    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('fleetProV2');
    
    let currentUser = null;
    let allUsers = [];
    let db = { leasing: [], todos: [], workshop: [] };

    // INITIALISIERUNG & AUTH CHECK
    function initApp() {
        dbRef.child('users').on('value', (snap) => {
            const users = snap.val();
            allUsers = users ? Object.values(users) : [];
            
            if (allUsers.length === 0) {
                document.getElementById('auth-title').innerText = "Erster Admin-Login (Passwort festlegen)";
            }
            renderStaffList();
        });

        dbRef.child('data').on('value', (snap) => {
            const data = snap.val();
            if (data) db = data;
            renderData();
        });
    }

    // AUTH LOGIK
    function handleAuth() {
        const user = document.getElementById('auth-user').value;
        const pass = document.getElementById('auth-pass').value;
        const msg = document.getElementById('auth-msg');

        if (allUsers.length === 0) {
            // Erster Admin
            const admin = { id: 'admin', name: user, pass: pass, role: 'admin' };
            dbRef.child('users/admin').set(admin);
            login(admin);
        } else {
            const found = allUsers.find(u => u.name === user && u.pass === pass);
            if (found) {
                login(found);
            } else {
                msg.innerText = "Falsche Zugangsdaten!";
            }
        }
    }

    function login(user) {
        currentUser = user;
        document.getElementById('auth-overlay').classList.add('hidden');
        document.getElementById('user-info').innerText = `Angemeldet als: ${user.name} (${user.role})`;
        
        if (user.role === 'admin') {
            document.getElementById('nav-admin').classList.remove('hidden');
        }
        initDashboard();
    }

    function logout() { location.reload(); }

    // ADMIN FUNKTIONEN
    function createStaff() {
        const name = document.getElementById('staff-name').value;
        const pass = document.getElementById('staff-pass').value;
        if (!name || !pass) return;
        
        const id = 'u' + Date.now();
        dbRef.child('users/' + id).set({ id, name, pass, role: 'staff' });
        document.getElementById('staff-name').value = "";
        document.getElementById('staff-pass').value = "";
    }

    function deleteUser(id) {
        if (id === 'admin') return alert("Haupt-Admin kann nicht gelöscht werden!");
        dbRef.child('users/' + id).remove();
    }

    function updateOwnProfile() {
        const newName = document.getElementById('admin-new-name').value;
        const newPass = document.getElementById('admin-new-pass').value;
        
        const updates = {};
        if (newName) updates.name = newName;
        if (newPass) updates.pass = newPass;
        
        dbRef.child('users/' + currentUser.id).update(updates);
        alert("Daten gespeichert! Bitte neu anmelden.");
        logout();
    }

    function renderStaffList() {
        const tb = document.querySelector('#staff-table tbody');
        if (!tb) return;
        tb.innerHTML = "";
        allUsers.forEach(u => {
            tb.innerHTML += `<tr>
                <td>${u.name}</td>
                <td>${u.role}</td>
                <td><button class="btn btn-danger" onclick="deleteUser('${u.id}')">Löschen</button></td>
            </tr>`;
        });
    }

    // DATEN-LOGIK (Beispielhaft)
    function save() { dbRef.child('data').set(db); }

    function addLease() {
        const model = document.getElementById('l-model').value;
        const start = document.getElementById('l-start').value;
        const months = parseInt(document.getElementById('l-months').value);
        if(!model || !start || isNaN(months)) return;
        
        let end = new Date(start);
        end.setMonth(end.getMonth() + months);
        if(!db.leasing) db.leasing = [];
        db.leasing.push({id: Date.now(), model, start, end: end.toISOString().split('T')[0]});
        save();
    }

    function showSection(id) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.add('hidden'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById('section-' + id).classList.remove('hidden');
        document.getElementById('section-title').innerText = id.toUpperCase();
        if(event) event.currentTarget.classList.add('active');
    }

    function renderData() {
        const lb = document.querySelector('#l-table tbody'); 
        if(lb && db.leasing) {
            lb.innerHTML = "";
            db.leasing.forEach(l => {
                const diff = Math.round((new Date(l.end) - new Date()) / (1000*60*60*24));
                lb.innerHTML += `<tr><td>${l.model}</td><td>${l.start}</td><td>${l.end}</td><td>${diff} d</td>
                    <td><button class="btn btn-danger" onclick="deleteLease(${l.id})">Löschen</button></td></tr>`;
            });
        }
    }

    function deleteLease(id) {
        db.leasing = db.leasing.filter(x => x.id !== id);
        save();
    }

    function initDashboard() {
        const stats = document.getElementById('stats-grid');
        if(!stats) return;
        stats.innerHTML = `<div class="card"><h4>Fahrzeuge</h4><h2>${db.leasing?.length || 0}</h2></div>`;
    }

    window.onload = () => {
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('de-DE');
        initApp();
    };
</script>
</body>
</html>
