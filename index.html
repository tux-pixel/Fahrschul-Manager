<!-- LEASING SEKTION ANPASSUNG -->
<div id="section-leasing" class="content-section hidden">
    <div class="card">
        <h3 id="lease-form-title">Fahrzeug hinzufügen / bearbeiten</h3>
        <!-- Verstecktes Feld für die ID beim Bearbeiten -->
        <input type="hidden" id="l-id">
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr auto auto; gap: 10px;">
            <input type="text" id="l-model" placeholder="Modell">
            <div>
                <label style="font-size: 0.7em;">Gekauft am:</label>
                <input type="date" id="l-start">
            </div>
            <div>
                <label style="font-size: 0.7em;">Rückgabe am:</label>
                <input type="date" id="l-end">
            </div>
            <button class="btn btn-success" id="btn-lease-save" onclick="saveLease()">Speichern</button>
            <button class="btn btn-danger hidden" id="btn-lease-cancel" onclick="resetLeaseForm()">Abbrechen</button>
        </div>
    </div>
    <div class="card">
        <table id="l-table">
            <thead>
                <tr>
                    <th>Modell</th>
                    <th>Gekauft am</th>
                    <th>Rückgabe am</th>
                    <th>Resttage</th>
                    <th>Aktion</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    // Aktualisierte Funktionen für das Leasing-Management

    function saveLease() {
        const id = document.getElementById('l-id').value;
        const model = document.getElementById('l-model').value;
        const start = document.getElementById('l-start').value;
        const end = document.getElementById('l-end').value;

        if(!model || !start || !end) return alert("Bitte alle Felder ausfüllen!");

        if(!db.leasing) db.leasing = [];

        if (id) {
            // Bearbeiten eines bestehenden Eintrags
            const index = db.leasing.findIndex(l => l.id == id);
            if (index !== -1) {
                db.leasing[index] = { id: parseInt(id), model, start, end };
            }
        } else {
            // Neuen Eintrag hinzufügen
            db.leasing.push({
                id: Date.now(),
                model,
                start,
                end
            });
        }

        save();
        resetLeaseForm();
    }

    function editLease(id) {
        const lease = db.leasing.find(l => l.id === id);
        if (!lease) return;

        // Formular mit Daten füllen
        document.getElementById('l-id').value = lease.id;
        document.getElementById('l-model').value = lease.model;
        document.getElementById('l-start').value = lease.start;
        document.getElementById('l-end').value = lease.end;

        // UI Anpassungen
        document.getElementById('lease-form-title').innerText = "Fahrzeug bearbeiten";
        document.getElementById('btn-lease-cancel').classList.remove('hidden');
        document.getElementById('btn-lease-save').innerText = "Aktualisieren";
    }

    function resetLeaseForm() {
        document.getElementById('l-id').value = "";
        document.getElementById('l-model').value = "";
        document.getElementById('l-start').value = "";
        document.getElementById('l-end').value = "";
        
        document.getElementById('lease-form-title').innerText = "Fahrzeug hinzufügen";
        document.getElementById('btn-lease-cancel').classList.add('hidden');
        document.getElementById('btn-lease-save').innerText = "Speichern";
    }

    // Die renderData Funktion muss angepasst werden, um den Bearbeiten-Button anzuzeigen
    function renderData() {
        const lb = document.querySelector('#l-table tbody'); 
        if(lb && db.leasing) {
            lb.innerHTML = "";
            db.leasing.forEach(l => {
                const diff = Math.round((new Date(l.end) - new Date()) / (1000*60*60*24));
                lb.innerHTML += `<tr>
                    <td>${l.model}</td>
                    <td>${new Date(l.start).toLocaleDateString('de-DE')}</td>
                    <td>${new Date(l.end).toLocaleDateString('de-DE')}</td>
                    <td>${diff} d</td>
                    <td>
                        <button class="btn btn-primary" style="padding: 5px 10px;" onclick="editLease(${l.id})">Ändern</button>
                        <button class="btn btn-danger" style="padding: 5px 10px;" onclick="deleteLease(${l.id})">Löschen</button>
                    </td>
                </tr>`;
            });
        }
    }
</script>
